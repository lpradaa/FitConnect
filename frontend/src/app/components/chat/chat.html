<div class="chat-wrapper">
  
  <header class="chat-header">
    <div class="chat-header__left">
      <button class="btn-volver" routerLink="/dashboard">
        <svg viewBox="0 0 24 24" width="24" height="24" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
      </button>
      
      <div class="chat-header__profile">
        <div class="avatar-circle">{{ companeroAvatar }}</div>
        <div class="user-info">
          <h2>{{ companeroNombre }}</h2>
          <span>En línea</span>
        </div>
      </div>
    </div>
    
    <div class="chat-header__right">
      <button class="icon-btn">📞</button>
      <button class="icon-btn">⋮</button>
    </div>
  </header>

  <div class="chat-body" #scrollMe>
    
    <div class="chat-date-separator">
      <span>Hoy</span>
    </div>

    @for (msg of historial; track msg.id) {
      
      <div class="message-row" [ngClass]="{'sent': msg.emisorId !== companeroId, 'received': msg.emisorId === companeroId}">
        <div class="bubble">
          <p class="content">{{ msg.contenido }}</p>
          <div class="message-meta">
            <span class="time">{{ msg.fechaEnvio | date:'shortTime' }}</span>
            <span *ngIf="msg.emisorId !== companeroId" class="ticks">✓✓</span>
          </div>
        </div>
      </div>

    } @empty {
      <div class="empty-state">
        <div class="empty-icon">👋</div>
        <p>Aún no hay mensajes.</p>
        <span>¡Rompe el hielo y propón una hora para entrenar!</span>
      </div>
    }
  </div>

  <footer class="chat-footer">
    
    <div class="emoji-menu" *ngIf="mostrarEmojis">
      <span *ngFor="let emoji of emojisRapidos" (click)="addEmoji(emoji)">{{ emoji }}</span>
    </div>

    <button class="btn-attach" (click)="toggleEmojis()" [class.active]="mostrarEmojis">😊</button>
    <button class="btn-attach">📎</button>
    
    <input 
      type="text" 
      class="chat-input"
      [(ngModel)]="nuevoMensaje" 
      (keyup.enter)="enviar()"
      placeholder="Escribe un mensaje" 
    />
    
    <button class="btn-enviar" (click)="enviar()" [disabled]="!nuevoMensaje.trim()">
      <svg *ngIf="nuevoMensaje.trim()" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
      <svg *ngIf="!nuevoMensaje.trim()" viewBox="0 0 24 24" width="22" height="22" fill="currentColor"><path d="M11.999 14.942c2.001 0 3.531-1.53 3.531-3.531V4.35c0-2.001-1.53-3.531-3.531-3.531S8.468 2.349 8.468 4.35v7.061c0 2.001 1.53 3.531 3.531 3.531zM8.968 4.35c0-1.668 1.365-3.031 3.031-3.031s3.031 1.363 3.031 3.031v7.061c0 1.668-1.365 3.031-3.031 3.031s-3.031-1.363-3.031-3.031V4.35zm9.531 7.061h-1.5c0 2.766-2.25 5-5 5s-5-2.234-5-5h-1.5c0 3.167 2.281 5.797 5.25 6.229v3.083h2.5v-3.083c2.969-.432 5.25-3.062 5.25-6.229z"></path></svg>
    </button>
  </footer>
</div>
