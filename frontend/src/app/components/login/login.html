<div class="login-wrapper">
  
  <div class="login-card">
    <header class="login-header">
      <h1 class="title">¡Hola de nuevo! 👋</h1>
      <p class="subtitle">
        Inicia sesión en <span class="brand-text">FitConnect</span> para encontrar a tu compañero de gimnasio.
      </p>
    </header>

    <form class="login-form">
      <div class="form-group">
        <label for="email">Email institucional o personal</label>
        <div class="input-container">
          <input type="email" id="email" placeholder="ejemplo@correo.com">
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-container">
          <input type="password" id="password" placeholder="••••••••">
        </div>
      </div>

      <button type="submit" class="submit-btn">
        Entrar a FitConnect <span>→</span>
      </button>
    </form>
  </div>

</div>
