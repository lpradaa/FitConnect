<div class="login-wrapper">
  
  <div class="login-card">
    <header class="login-header">
      <h1 class="title">¡Hola de nuevo! 👋</h1>
      <p class="subtitle">
        Inicia sesión en <span class="brand-text">FitConnect</span> para encontrar a tu compañero de gimnasio.
      </p>
    </header>

    <form class="login-form" (ngSubmit)="onLogin()">
      <div class="form-group">
        <label for="email">Email institucional o personal</label>
        <div class="input-container">
          <input 
            type="email" 
            id="email" 
            name="email"
            [(ngModel)]="email" 
            placeholder="ejemplo@correo.com"
            required>
        </div>
      </div>

      <div class="form-group">
        <label for="password">Contraseña</label>
        <div class="input-container">
          <input 
            type="password" 
            id="password" 
            name="password"
            [(ngModel)]="password" 
            placeholder="••••••••"
            required>
        </div>
      </div>

      @if (errorMessage()) {
        <div class="error-message" style="color: #e74c3c; font-size: 0.9rem; margin-bottom: 1rem; text-align: center;">
          {{ errorMessage() }}
        </div>
      }

      <button type="submit" class="submit-btn" [disabled]="!email || !password">
        Entrar a FitConnect <span>→</span>
      </button>
    </form>
  </div>

</div>
