<header class="header">
  <div class="header__left">
    <button class="header__button" (click)="toggleSidebar()" aria-label="Abrir menú">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </button>
    
    <a routerLink="/" class="header__logo-container">
       <svg viewBox="0 0 250 50" class="logo-svg" xmlns="http://www.w3.org/2000/svg">
          <defs>
              <linearGradient id="fitGrad1" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#4ade80" />
                  <stop offset="100%" stop-color="#16a34a" />
              </linearGradient>
              <linearGradient id="fitGrad2" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#2dd4bf" />
                  <stop offset="100%" stop-color="#0f766e" />
              </linearGradient>
          </defs>
          <g>
              <circle cx="25" cy="25" r="20" fill="url(#fitGrad1)" opacity="0.9"/>
              <circle cx="43" cy="25" r="20" fill="url(#fitGrad2)" opacity="0.9"/>
              <path d="M 37 14 L 26 27 L 32 27 L 29 38 L 43 23 L 35 23 Z" fill="#ffffff" />
          </g>
          <text x="75" y="27" font-family="'Inter', system-ui, sans-serif" font-size="28" font-weight="800" fill="#4ade80" dominant-baseline="middle">
              Fit<tspan fill="#4ade80" font-weight="500">Connect</tspan>
          </text>
      </svg>
    </a>
  </div>
  
  <div class="header__right"></div>
</header>

<div class="backdrop" [class.backdrop--show]="isSidebarOpen()" (click)="toggleSidebar()"></div>

<aside class="sidebar" [class.sidebar--open]="isSidebarOpen()">
  
  <div class="sidebar__header">
    <button class="sidebar__close-btn" (click)="toggleSidebar()" aria-label="Cerrar menú">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#999" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>

  <div class="sidebar__user-profile" *ngIf="isLoggedIn()">
    <div class="sidebar__avatar">{{ currentUser().initial }}</div>
    <div class="sidebar__user-info">
      <span class="sidebar__user-name">{{ currentUser().name }}</span>
      <span class="sidebar__user-email">{{ currentUser().email }}</span>
    </div>
  </div>

  <hr class="sidebar__divider" />

  <nav class="sidebar__nav">
    <a routerLink="/dashboard" class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active" (click)="toggleSidebar()">
      <span class="sidebar__nav-icon">🏠</span> Dashboard
    </a>
    
    <a routerLink="/conexiones" class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active" (click)="toggleSidebar()">
      <span class="sidebar__nav-icon">🤝</span> Mis Compañeros
    </a>

    <a routerLink="/explore" class="sidebar__nav-item" routerLinkActive="sidebar__nav-item--active" (click)="toggleSidebar()">
      <span class="sidebar__nav-icon">🔍</span> Explorar Compañeros
    </a>
  </nav>

  <div class="sidebar__footer">
    <button class="sidebar__auth-button" (click)="cerrarSesion()">
      Cerrar Sesión
    </button>
  </div>
</aside>
